{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | HRMS</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .login-bg {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.06) 0%, transparent 50%),
                  radial-gradient(ellipse at 60% 80%, rgba(6,182,212,0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    .grid-lines {
      position: fixed; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    .login-card {
      width: 100%; max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px;
      position: relative;
      z-index: 1;
      animation: fadeInUp 0.6s ease forwards;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }

    .login-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
      border-radius: 20px 20px 0 0;
    }

    .login-logo {
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px; margin-bottom: 36px;
    }

    .login-logo-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      box-shadow: 0 0 30px rgba(59,130,246,0.3);
      animation: pulse-glow 3s infinite;
    }

    @keyframes pulse-glow {
      0%,100% { box-shadow: 0 0 20px rgba(59,130,246,0.3); }
      50% { box-shadow: 0 0 40px rgba(59,130,246,0.5); }
    }

    .login-title { font-size: 22px; font-weight: 700; text-align: center; }
    .login-subtitle { font-size: 13px; color: var(--text3); text-align: center; }

    .input-group {
      position: relative; margin-bottom: 16px;
    }

    .input-group .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text3); font-size: 14px; z-index: 1;
    }

    .input-group input {
      padding-left: 42px;
    }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white; border: none; border-radius: 10px;
      padding: 13px; font-size: 15px; font-weight: 600;
      font-family: 'Sora', sans-serif;
      cursor: pointer; transition: all 0.3s;
      margin-top: 8px;
      box-shadow: 0 4px 15px rgba(59,130,246,0.3);
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(59,130,246,0.45);
    }

    .btn-login:active { transform: translateY(0); }

    .error-msg {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
      color: var(--danger); border-radius: 9px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }

    .login-footer { text-align: center; margin-top: 24px; color: var(--text3); font-size: 12px; }

    label { text-align: left; }
  </style>
</head>
<body>
  <div class="login-bg"></div>
  <div class="grid-lines"></div>

  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">
        <img src="{% static 'img/favicon.png' %}" alt="HRMS Logo" style="width:30px;height:35px;">
      </div>
      <div>
        <div class="login-title">Welcome Back</div>
        <div class="login-subtitle">Sign in to HR Management System</div>
      </div>
    </div>

    {% if form.non_field_errors %}
      <div class="error-msg">
        <i class="fa-solid fa-circle-exclamation"></i>
        {{ form.non_field_errors.0 }}
      </div>
    {% endif %}

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="form-group">
        <label><i class="fa-solid fa-id-card" style="margin-right:6px;color:var(--accent2)"></i>Iqama / ID Number</label>
        <div class="input-group">
          <i class="fa-solid fa-fingerprint input-icon"></i>
          <input type="text" name="iqama_number" placeholder="Enter your Iqama number"
                 value="{{ form.iqama_number.value|default:'' }}" autocomplete="off" required>
        </div>
      </div>
      <div class="form-group">
        <label><i class="fa-solid fa-lock" style="margin-right:6px;color:var(--accent2)"></i>Password</label>
        <div class="input-group">
          <i class="fa-solid fa-key input-icon"></i>
          <input type="password" name="password" id="passwordInput" placeholder="Enter your password" required>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="fa-solid fa-right-to-bracket"></i>
        Sign In
      </button>
    </form>

    <div class="login-footer">
      HR Management System &copy; {% now "Y" %}<br>
      <span style="color:var(--text3)">Contact IT support if you need access</span>
    </div>
  </div>

  <script>
    // Add enter key support
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        document.querySelector('.btn-login').click();
      }
    });
  </script>
</body>
</html>
